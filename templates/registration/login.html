<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://kit.fontawesome.com/9b45bbf03c.js" crossorigin="anonymous"></script>
<title>Login</title>
<style>

/* Set a style for all buttons */
button {
  background-color: deeppink;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  font-family: cursive, sans-serif;
  font-weight: bold;
  font-size: 17px;
}
button:hover {
  opacity: 0.8;
}
/* Add Zoom Animation */
.animate {
  -webkit-animation: animatezoom 0.6s;
  animation: animatezoom 0.6s
}
@-webkit-keyframes animatezoom {
  from {-webkit-transform: scale(0)} 
  to {-webkit-transform: scale(1)}
} 
@keyframes animatezoom {
  from {transform: scale(0)} 
  to {transform: scale(1)}
}
</style>
</head>
<body style="font-family: cursive, sans-serif; ">

<main>
  {% block content %}
  <h2 style="text-align: center;">Login</h2>
  <form class="modal-content animate" method="post" style="margin: 100px 200px 300px 500px">
    {% csrf_token %}
    {{ form.as_p }}
  <button type="submit">Log In</button>
  </form>
  {% endblock %}
</main>
</body>
</html>
