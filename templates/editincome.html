<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit</title>
    <script src="https://kit.fontawesome.com/9b45bbf03c.js" crossorigin="anonymous"></script>
    <style>
        body{
            background-image: linear-gradient(to bottom right, white, pink);
          }
          input{
              font-family: cursive, sans-serif;
              font-size: 17px;
              border: 1px solid black;
              padding: 6px;
              border-radius: 7px;
              margin-top: 50px;
          }
          input[type=button]:hover{
              background-color: black;
              border: 1px solid white;
          }
          input[type=button]{
              background-color:dimgray;
              text-align: center;
              color: white;
              border: 1px solid dimgray;
              margin: 7px;
              float:right;
          }
          
          .header {
              width: 100%;
              justify-content: center;
              align-items: center;
              background: #000;
              position: sticky;
              top: 0;
              overflow: hidden;
            }
            
            #shining {
              font-weight: 700;
              text-align: center;
              font-size: 40px;
              font-family: cursive, sans-serif;
              text-transform: uppercase;
              background: linear-gradient(90deg, #000, #fff, #000);
              letter-spacing: 5px;
              -webkit-background-clip: text;
              background-clip: text;
              -webkit-text-fill-color: transparent;
              background-repeat: no-repeat;
              background-size: 80%;
              animation: shine 5s linear infinite;
              position: relative;
            }
            
            @keyframes shine {
              0% {
                background-position-x: -500%;
              }
              100% {
                background-position-x: 500%;
              }
            }
            a:hover{
                font-weight:bold;
                border: 1px solid black;
            }
            a{
                text-decoration: none;
                padding: 14px 16px;
                margin: 10px;
                font-weight:normal;
                color: black;
                border: none;
            }
            
            form{
                margin: 15px;
            }
    </style>
</head>
<body style="font-family:cursive, sans-serif; margin: 0 0 0 0;">
    <div class="header">
        <p id="shining">Income List <i class="fa fa-hand-holding-usd" aria-hidden="true" fa-3x></i></p>
    </div>
    <form method="post">
        {% csrf_token %}
        {{form}}
        <input type="submit" action="/elist/editincome/{{form.id}}">
    </form>
    <a href="{% url 'createincome' %}" style="background-color: skyblue; padding: 14px 16px; margin-left: 300px;"><i class="fa fa-plus" aria-hidden="true" fa-3x></i>Add another expense</a> 
</body>
</html>
